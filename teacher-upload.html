<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Portal | ShikhaBondhon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-[#F8FAFC]">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r p-6 hidden lg:block">
            <h2 class="text-xl font-bold text-[#006A4E] mb-10">SB Teacher</h2>
            <nav class="space-y-4">
                <a href="#" class="block p-3 bg-green-50 text-[#006A4E] rounded-lg font-bold">📊 Analytics</a>
                <a href="#" class="block p-3 text-gray-600 hover:bg-gray-50 rounded-lg">📤 Upload Content</a>
                <a href="#" class="block p-3 text-gray-600 hover:bg-gray-50 rounded-lg">💬 Student Doubts</a>
                <a href="teacher-profile.html" class="block p-3 text-gray-600 hover:bg-gray-50 rounded-lg">👤 My Profile</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-3xl font-bold mb-6">Upload New Lesson</h2>
                
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                    <form class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Subject</label>
                                <select class="w-full border p-3 rounded-lg bg-gray-50">
                                    <option>Physics (HSC)</option>
                                    <option>Chemistry (HSC)</option>
                                    <option>Math (Admission)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Lesson Title</label>
                                <input type="text" class="w-full border p-3 rounded-lg bg-gray-50" placeholder="e.g., Quantum Theory Intro">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Video Link (YouTube/Vimeo)</label>
                            <input type="url" class="w-full border p-3 rounded-lg bg-gray-50" placeholder="https://youtube.com/...">
                        </div>

                        <div class="border-2 border-dashed border-gray-200 p-10 text-center rounded-2xl hover:border-[#006A4E] transition">
                            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-3"></i>
                            <p class="text-gray-600">Drag & Drop **Handnote PDF** here</p>
                            <input type="file" class="hidden" id="fileUpload">
                            <button type="button" onclick="document.getElementById('fileUpload').click()" class="mt-4 text-[#006A4E] font-bold">Browse Files</button>
                        </div>

                        <button type="submit" class="w-full bg-[#006A4E] text-white py-4 rounded-xl font-bold shadow-lg hover:bg-opacity-90">Publish Module</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
